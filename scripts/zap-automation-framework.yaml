---
# ZAP Automation Framework Plan — IBM SSO Authenticated Scan for ICA Applications
#
# This file is used by ZAP's Automation Framework (ZAP 2.12+) as an ALTERNATIVE
# to the API-call-based approach in zap-full-scan-authenticated.sh.
#
# Usage (run directly — no Docker daemon needed inside the ZAP container):
#
# Classic Pipeline job (Custom Docker Image: ghcr.io/zaproxy/zaproxy:stable):
#   bash scripts/run-ica-authenticated-scan.sh
#   (The main script generates a plan at runtime with credentials substituted in
#    and calls /zap/zap.sh -cmd -autorun /zap/wrk/automation-plan.yaml)
#
# Local Docker run (for testing outside IBM Toolchain):
#   docker run --rm \
#     -v "$(pwd)/scripts/zap-custom-scripts:/zap/scripts:ro" \
#     -v "$(pwd)/scripts:/zap/plan:ro" \
#     -v "$(pwd)/zap-reports:/zap/wrk:rw" \
#     -e ICA_APP_URL \
#     -e IBM_SSO_USERNAME \
#     -e IBM_SSO_PASSWORD \
#     ghcr.io/zaproxy/zaproxy:stable \
#     zap.sh -cmd -autorun /zap/plan/zap-automation-framework.yaml
#
# Environment variables referenced as ${VAR_NAME} are substituted by ZAP at
# runtime when running inside the container.  The variables must be passed via
# Docker -e flags (or the pipeline environment when using dind).
#
# Ref: https://www.zaproxy.org/docs/automate/automation-framework/

env:
  # ---------------------------------------------------------------------------
  # Contexts — define the scope of the scan
  # ---------------------------------------------------------------------------
  contexts:
    - name: ICA-App-Context
      urls:
        - "${ICA_APP_URL}"
      includePaths:
        - "${ICA_APP_URL}.*"
      excludePaths:
        - ".*logout.*"
        - ".*signout.*"
        - ".*sign-out.*"
        - ".*download.*"
        - ".*export.*"
        - ".*[.]pdf$"
        - ".*[.]zip$"

      # -----------------------------------------------------------------------
      # Authentication — script-based IBM w3id SAML2 SSO
      # -----------------------------------------------------------------------
      authentication:
        method: "script"
        parameters:
          scriptName: "IBM-SSO-Auth"
          # ZAP 2.14+ (stable image) uses GraalVM JS — engine name is "ECMAScript : Graal.js"
          # ZAP 2.13 and earlier used "Oracle Nashorn"
          scriptEngine: "ECMAScript : Graal.js"
          ICA_APP_URL: "${ICA_APP_URL}"
          IBM_SSO_LOGIN_URL: "https://w3id.sso.ibm.com/auth/sps/samlidp2/saml20"
        verification:
          method: "response"
          # \Q...\E is Java Pattern.quote() — treated as literal strings, not regex
          loggedInRegex: '\QLogout\E|\Qlogout\E|\QSign Out\E'
          loggedOutRegex: '\QLogin\E|\Qlogin\E|\Qw3id.sso.ibm.com\E'
          pollFrequency: 60
          pollUnits: "requests"

      # -----------------------------------------------------------------------
      # Authenticated users
      # -----------------------------------------------------------------------
      users:
        - name: "IBMSSOUser"
          credentials:
            username: "${IBM_SSO_USERNAME}"
            password: "${IBM_SSO_PASSWORD}"

  # ---------------------------------------------------------------------------
  # Global parameters
  # ---------------------------------------------------------------------------
  parameters:
    failOnError: true
    failOnWarning: false
    progressToStdout: true

# =============================================================================
# Jobs — ordered list of scan tasks
# =============================================================================
jobs:

  # ---------------------------------------------------------------------------
  # 1. Load the IBM SSO authentication script from the mounted volume
  # ---------------------------------------------------------------------------
  - type: script
    name: Load IBM SSO Auth Script
    parameters:
      action: add
      type: authentication
      # ZAP 2.14+ (stable image) uses GraalVM JS — engine name is "ECMAScript : Graal.js"
      engine: "ECMAScript : Graal.js"
      name: "IBM-SSO-Auth"
      # When running inside the ZAP container mount /zap/scripts from repo's zap-custom-scripts dir
      # Confirmed param name: scriptPath (not script, not fileName)
      scriptPath: "/zap/scripts/ibm-sso-auth.js"

  # ---------------------------------------------------------------------------
  # 2. Traditional Spider (crawl as authenticated user)
  # ---------------------------------------------------------------------------
  - type: spider
    name: Spider ICA Application
    parameters:
      context: ICA-App-Context
      user: IBMSSOUser
      maxDuration: 15          # minutes
      maxDepth: 5
      maxChildren: 0           # 0 = unlimited
      acceptCookies: true
      handleODataParametersVisited: false
      handleParameters: use_all
      requestWaitTime: 200     # ms between requests
      sendRefererHeader: true
      threadCount: 2
    tests:
      - name: "Spider found URLs"
        type: stats
        statistic: "automation.spider.urls.added"
        operator: ">="
        value: 1
        onFail: WARN

  # ---------------------------------------------------------------------------
  # 3. AJAX Spider (optional — disabled by default, set enabled: true to use)
  #    Requires a browser; use only when the app is a SPA
  # ---------------------------------------------------------------------------
  - type: spiderAjax
    name: AJAX Spider (optional)
    parameters:
      context: ICA-App-Context
      user: IBMSSOUser
      maxDuration: 5           # minutes
      maxCrawlDepth: 10
      numberOfBrowsers: 1
      browserId: firefox-headless
      clickDefaultElems: true
      clickElemsOnce: true
      randomInputs: false
    enabled: false             # <- set to true for SPA / React / Angular apps

  # ---------------------------------------------------------------------------
  # 4. Wait for passive scan to complete on spidered content
  # ---------------------------------------------------------------------------
  - type: passiveScan-wait
    name: Wait for Passive Scan
    parameters:
      maxDuration: 10          # minutes

  # ---------------------------------------------------------------------------
  # 5. Active Scan (attack as authenticated user)
  # ---------------------------------------------------------------------------
  - type: activeScan
    name: Active Scan ICA Application
    parameters:
      context: ICA-App-Context
      user: IBMSSOUser
      maxScanDurationInMins: 60
      maxRuleDurationInMins: 5
      addQueryParam: false
      defaultPolicy: ""        # use ZAP default policy; set to "Custom-Policy" if custom XML provided
      delayInMs: 0
      handleAntiCSRFTokens: true
      injectPluginIdInHeader: false
      scanHeadersAllRequests: false
      threadPerHost: 2
    tests:
      - name: "No High alerts"
        type: alert
        action: passIfNoAlert
        risk: High
        onFail: WARN            # Change to FAIL if you want the stage to fail on High alerts

  # ---------------------------------------------------------------------------
  # 6. Reports — HTML, XML, JSON, and Markdown
  # ---------------------------------------------------------------------------
  - type: report
    name: HTML Report
    parameters:
      template: traditional-html-plus
      reportDir: /zap/wrk
      reportFile: zap-report-ica.html
      reportTitle: "ZAP Security Scan — ICA Application"
      reportDescription: "Authenticated DAST scan using IBM w3id SSO"
      displayReport: false

  - type: report
    name: XML Report
    parameters:
      template: traditional-xml
      reportDir: /zap/wrk
      reportFile: zap-report-ica.xml
      reportTitle: "ZAP Security Scan — ICA Application"

  - type: report
    name: JSON Report
    parameters:
      template: traditional-json
      reportDir: /zap/wrk
      reportFile: zap-report-ica.json
      reportTitle: "ZAP Security Scan — ICA Application"

  - type: report
    name: Markdown Report
    parameters:
      template: traditional-md
      reportDir: /zap/wrk
      reportFile: zap-report-ica.md
      reportTitle: "ZAP Security Scan — ICA Application"

