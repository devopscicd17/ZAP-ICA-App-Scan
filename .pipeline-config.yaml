version: '1'

ica-security-scan:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  dind: true
  abort_on_failure: false

  script: |
    #!/usr/bin/env bash
    set -euo pipefail

    echo "========================================="
    echo "IBM ICA Authenticated ZAP Scan"
    echo "========================================="

    pwd
    ls -la
    ls -R scripts || true

    #
    # Required pipeline properties
    #
    : "${ICA_APP_URL:?ICA_APP_URL pipeline property is required}"
    : "${IBM_SSO_USERNAME:?IBM_SSO_USERNAME pipeline property is required}"
    : "${IBM_SSO_PASSWORD:?IBM_SSO_PASSWORD pipeline property is required}"

    #
    # Optional
    #
    export ZAP_SCAN_TIMEOUT="${ZAP_SCAN_TIMEOUT:-60}"
    export ZAP_ALERT_THRESHOLD="${ZAP_ALERT_THRESHOLD:-MEDIUM}"
    export ZAP_MAX_DEPTH="${ZAP_MAX_DEPTH:-5}"
    export ZAP_THREAD_COUNT="${ZAP_THREAD_COUNT:-5}"
    export ZAP_REPORT_DIR="${PWD}/reports"

    mkdir -p "${ZAP_REPORT_DIR}"

    echo "Application URL : ${ICA_APP_URL}"
    echo "IBM User        : ${IBM_SSO_USERNAME}"
    echo "Report Dir      : ${ZAP_REPORT_DIR}"

    chmod +x scripts/run-ica-authenticated-scan.sh
    chmod +x scripts/zap-full-scan-authenticated.sh

    ./scripts/run-ica-authenticated-scan.sh

  artifacts:
    - reports/**
