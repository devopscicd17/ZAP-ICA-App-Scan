version: '1'

setup:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    if [[ "$(get_env pipeline_namespace "")" == "cd" || "$(get_env pipeline_namespace "")" == "cc" ]]; then
      # The collect_artifacts performed by cd-start is only collecting a subset of data from inventory files
      # complement with the app_artifacts origin content that may contains valuable information for deploying tools
      inventory_path="$(get_env inventory-path)"
      while read -r artifact; do
        name="$(load_artifact "${artifact}" name)"
        type="$(load_artifact "${artifact}" type)"
        # Setting additional property to the artifact
        inventory_entry_path="$(load_artifact "${artifact}" "inventory-entry")"
        echo "Completing artifact $artifact - name $name - type $type by extracting app and origin from $inventory_entry_path"
        if jq -e '.app_artifacts.origin' "$inventory_entry_path" > /dev/null 2>&1; then
          save_artifact "$artifact" "origin=$(jq -r -c '.app_artifacts.origin' "$inventory_entry_path")"
        else
          echo "no app_artifacts.origin found in $inventory_entry_path"
          save_artifact "$artifact" "origin=unknown"
        fi
        if jq -e '.app_artifacts.app' "$inventory_entry_path" > /dev/null 2>&1; then
          save_artifact "$artifact" "app=$(jq -r -c '.app_artifacts.app' "$inventory_entry_path")"
        else
          echo "no app_artifacts.app found in $inventory_entry_path"
          save_artifact "$artifact" "app=unknown"
        fi
      done < <(list_artifacts)

      # No branch protection to setup
      exit 0
    fi

    # setup branch protection for the app repo branch
    # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/utils__setup_branch-protection.md
    ${COMMONS_PATH}/utils/setup_branch-protection.sh

test:
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    cd "$WORKSPACE/$(load_repo app-repo path)"

    # trigger unit tests
    source $WORKSPACE/$PIPELINE_CONFIG_REPO_PATH/scripts/ci-cd/unit-tests.sh

containerize:
  dind: true
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    source "${ONE_PIPELINE_PATH}/tools/get_repo_params"
    repo_name="$(get_repo_name "$(load_repo app-repo url)")"

    exit_code=0

    # workaround until https://github.ibm.com/one-pipeline/adoption-issues/issues/3351 is fixed
    if [[ -z "$(get_env cr-resource-group "")" && -n "$(get_env dev-resource-group "")" ]]; then
      set_env cr-resource-group "$(get_env dev-resource-group)"
    fi

    # Build container image from Dockerfile
    # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/build-artifact__docker.md
    ${COMMONS_PATH}/build-artifact/docker.sh --source "Dockerfile" --repo-key "app-repo" || exit_code=$?

    # Build packaged helm chart for later signature
    # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/build-artifact__helm.md
    ${COMMONS_PATH}/build-artifact/helm.sh \
      --source "chart/pythonstarterkit/Chart.yaml" \
      --repo-key "app-repo" \
      --artifact-name "${repo_name}_helm_chart" \
      --index "0" || exit_code=$?

    exit $exit_code

deploy:
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    exit_code=0

    if [ "$(get_env pipeline_namespace "")" = "ci" ]; then
      source "${ONE_PIPELINE_PATH}/tools/get_repo_params"
      repo_name="$(get_repo_name "$(load_repo app-repo url)")"

      # save the specific values file as an artifact that will be saved in the inventory in the release stage
      ${COMMONS_PATH}/build-artifact/save-deployment-artifact.sh \
        --repo-key app-repo \
        --source "chart/$(get_env target-environment "dev")-values.yaml" \
        --artifact-name "${repo_name}_helm/config/dev" \
        --artifact-type "dev-config" \
        --index "0" || exit_code=$?

      # use specific values file depending on target to perform helm chart deployment
      # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/deploy__helm.md
      set_env helm-upgrade-additional-values-files "$WORKSPACE/$(load_repo app-repo path)/chart/$(get_env target-environment "dev")-values.yaml"
      ${COMMONS_PATH}/deploy/helm.sh --repo-key "app-repo" --source "chart/pythonstarterkit/Chart.yaml" --environment-setup "scripts/ci-cd/.env.deploy.sh" || exit_code=$?
    else
      source "${ONE_PIPELINE_PATH}/tools/get_repo_params"
      inventory_path="$(get_env inventory-path)"
      # iterate for deployment
      for inventory_entry in $(jq -r '.[] ' $(get_env deployment-delta-path)); do
        type=$(jq -r '.type' "$inventory_path/$inventory_entry")
        repository_url=$(jq -r '.repository_url' "$inventory_path/$inventory_entry")
        commit_id=$(jq -r '.commit_sha' "$inventory_path/$inventory_entry")
        application=$(jq -r '.app_artifacts.app' "$inventory_path/$inventory_entry")
        if [ "$type" == "helm" ]; then
          # clone the repo containing helm chart with the appropriate commmit
          temp_dir=$(mktemp -d -p "$WORKSPACE")
          repo_key=$(basename "$temp_dir")

          repo_token_path="$WORKSPACE/secrets/$repo_key"
          get_repo_token "$repository_url" "$repo_token_path"

          # shellcheck disable=SC1091
          source "${ONE_PIPELINE_PATH}/git/clone_repo" "$repository_url" ""  \
            "$temp_dir" "$repo_token_path" "0" "$commit_id"

          pushd "$temp_dir" > /dev/null || exit 1
          git config advice.detachedHead false
          git checkout "$commit_id"
          popd > /dev/null || exit 1

          save_repo "$repo_key" "url=$repository_url" "path=$repo_key" "commit=$commit_id"

          # perform the deployment action
          # use specific values file depending on target to perform helm chart deployment
          # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/deploy__helm.md
          set_env helm-upgrade-additional-values-files "$WORKSPACE/$(load_repo "$repo_key" path)/chart/$(get_env target-environment "pre-prod")-values.yaml"
          ${COMMONS_PATH}/deploy/helm.sh \
            --source "chart/pythonstarterkit/Chart.yaml" \
            --repo-key "$repo_key" \
            --app "$application" \
            --environment-setup "scripts/ci-cd/.env.deploy.sh" || exit_code=$?
        fi
      done
    fi

    exit $exit_code

acceptance-test:
  abort_on_failure: true
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    source "$WORKSPACE/$PIPELINE_CONFIG_REPO_PATH/acceptance-test/.env.acceptance-test.sh"
    source "$WORKSPACE/$PIPELINE_CONFIG_REPO_PATH/scripts/ci-cd/acceptance-tests.sh"

release:
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      env
      set -x
    fi

    # Check the status of pipeline and then release the artifacts to inventory
    ONE_PIPELINE_STATUS=$(get_env one-pipeline-status 0)
    if [ "$(get_env skip-inventory-update-on-failure 1)" == "1" ]; then
      if [ $ONE_PIPELINE_STATUS -eq 1 ]; then
         echo "Skipping release stage as some of the pipeline stages are not successful."
         exit 1
      fi
    fi

    source "${ONE_PIPELINE_PATH}/tools/get_repo_params"
    repo_name="$(get_repo_name "$(load_repo app-repo url)")"

    ${COMMONS_PATH}/build-artifact/save-deployment-artifact.sh \
      --repo-key app-repo \
      --source "chart/pre-prod-values.yaml" \
      --artifact-name "${repo_name}_helm/config/pre-prod" \
      --artifact-type "pre-prod-config" \
      --index 1

    ${COMMONS_PATH}/build-artifact/save-deployment-artifact.sh \
      --repo-key app-repo \
      --source "chart/prod-values.yaml" \
      --artifact-name "${repo_name}_helm/config/prod" \
      --artifact-type "prod-config" \
      --index 2

    # create the entries in the inventory repository from the artifacts
    # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/release__release.md
    ${COMMONS_PATH}/release/release.sh

dynamic-scan:
  dind: true
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash
    if [ -z "$(get_env opt-in-dynamic-scan "")" ]; then
      echo "If you want to enable this stage, add 'opt-in-dynamic-scan' parameter to your pipeline with any value. Also, please add 'opt-in-dynamic-api-scan' to your pipeline with any value to have api scans running, and 'opt-in-dynamic-ui-scan' with any value to have ui scans running" >&2
    else
      if [[ "$(get_env pipeline_namespace)" == *"cc"* ]]; then
        # consider there is a single repository for this CC
        repo_key="repo-1"
        app_url=$(get_env app_url "")
        if [[ -z "${app_url}" ]]; then
          echo "Please provide the app-url as the running application url. Recommended to use stage/test environment to run the Dynamic scan." >&2
          exit 1
        fi
      else
        # for CI the repo key is app-repo
        repo_key="app-repo"
      fi
      # start the sub pipeline to run dynamic scan
      # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/dynamic-scan__trigger-async-zap.md
      ${COMMONS_PATH}/dynamic-scan/trigger-async-zap.sh \
        --api "definitions/definitions.json,public/swagger.yaml" \
        --ui "scripts/ci-cd/zap/uiscripts/run.sh" \
        --environment-setup "scripts/ci-cd/zap/zap-custom-scripts/.env.dynamic-scan.sh" \
        --scope "" \
        --repo-key "$repo_key" \
        --evidence-type "com.ibm.dynamic_scan"
    fi

owasp-zap:
  dind: true
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash

    # run OWASP-ZAP scans
    # see https://us-south.git.cloud.ibm.com/open-toolchain/compliance-commons/-/blob/master/doc/dynamic-scan__start-zap-scans.md
    source "${COMMONS_PATH}/dynamic-scan/start-zap-scans.sh"

# =============================================================================
# ICA Authenticated Security Scan
# Performs ZAP DAST with IBM w3id SAML2 SSO authentication for ICA-hosted apps.
#
# Required Toolchain Secure Properties (IBM Toolchain uses underscores only):
#   ibm_sso_username  — IBM w3id email  (e.g. user@ibm.com)
#   ibm_sso_password  — IBM w3id password
#   app_url           — Target ICA application URL
#
# Optional Toolchain Properties:
#   zap_scan_timeout       — Scan timeout in minutes      (default: 60)
#   zap_alert_threshold    — HIGH | MEDIUM | LOW           (default: MEDIUM)
#   zap_max_depth          — Spider crawl depth           (default: 5)
#   zap_docker_image       — ZAP Docker image to use
#   opt_in_ica_scan        — Set to any value to enable this stage
# =============================================================================
ica-security-scan:
  dind: true
  abort_on_failure: false
  image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
  script: |
    #!/usr/bin/env bash
    set -eo pipefail

    if [[ "$PIPELINE_DEBUG" == 1 ]]; then
      trap 'echo "[TRACE] line $LINENO: $BASH_COMMAND"' DEBUG
    fi

    # ---------------------------------------------------------------------------
    # Skip stage if not opted in.
    # IBM Toolchain property names MUST use underscores — dashes silently return "".
    # ---------------------------------------------------------------------------
    _OPT_IN="$(get_env opt_in_ica_scan "")"
    if [[ -z "${_OPT_IN}" ]]; then
      echo "[INFO] ICA authenticated scan not enabled."
      echo "[INFO] Add pipeline property 'opt_in_ica_scan' with any value to enable."
      exit 0
    fi

    # ---------------------------------------------------------------------------
    # Resolve credentials — all property names use underscores.
    # ---------------------------------------------------------------------------
    export ICA_APP_URL="$(get_env app_url "")"
    export IBM_SSO_USERNAME="$(get_env ibm_sso_username "")"

    # Password retrieved outside of any trace/debug output to prevent logging.
    _PASS="$(get_env ibm_sso_password "")"
    export IBM_SSO_PASSWORD="${_PASS}"
    unset _PASS

    # ---------------------------------------------------------------------------
    # Validate — fail fast with actionable messages before running anything.
    # ---------------------------------------------------------------------------
    _MISSING=""
    [[ -z "${ICA_APP_URL}"      ]] && _MISSING="${_MISSING}\n  app_url           (Target ICA application URL)"
    [[ -z "${IBM_SSO_USERNAME}" ]] && _MISSING="${_MISSING}\n  ibm_sso_username  (IBM w3id email)"
    [[ -z "${IBM_SSO_PASSWORD}" ]] && _MISSING="${_MISSING}\n  ibm_sso_password  (IBM w3id password)"

    if [[ -n "${_MISSING}" ]]; then
      echo "" >&2
      echo "================================================================" >&2
      echo " ERROR: Required Toolchain Secure Properties are not set:" >&2
      printf "${_MISSING}\n" >&2
      echo "" >&2
      echo " In IBM Cloud Toolchain UI:" >&2
      echo "   1. Open your Toolchain → Pipeline → Settings" >&2
      echo "   2. Click 'Secure Properties' (or 'Environment properties')" >&2
      echo "   3. Add each missing property listed above" >&2
      echo "   Note: Property names must use underscores, not dashes." >&2
      echo "================================================================" >&2
      exit 1
    fi

    # ---------------------------------------------------------------------------
    # Optional scan tuning (all names use underscores).
    # ---------------------------------------------------------------------------
    export ZAP_SCAN_TIMEOUT="$(get_env zap_scan_timeout "60")"
    export ZAP_ALERT_THRESHOLD="$(get_env zap_alert_threshold "MEDIUM")"
    export ZAP_MAX_DEPTH="$(get_env zap_max_depth "5")"
    export ZAP_DOCKER_IMAGE="$(get_env zap_docker_image "ghcr.io/zaproxy/zaproxy:stable")"

    # ---------------------------------------------------------------------------
    # Locate scan scripts.
    # This repo IS the pipeline config repo; PIPELINE_CONFIG_REPO_PATH holds its
    # relative path inside $WORKSPACE when set by the Toolchain runner.
    # ---------------------------------------------------------------------------
    if [[ -n "${PIPELINE_CONFIG_REPO_PATH:-}" ]]; then
      cd "$WORKSPACE/${PIPELINE_CONFIG_REPO_PATH}"
    else
      cd "$WORKSPACE"
    fi

    if [[ ! -f "scripts/run-ica-authenticated-scan.sh" ]]; then
      echo "[ERROR] scripts/run-ica-authenticated-scan.sh not found in $(pwd)" >&2
      echo "[ERROR] Expected to be in: ${WORKSPACE}/${PIPELINE_CONFIG_REPO_PATH:-}" >&2
      exit 1
    fi

    # ---------------------------------------------------------------------------
    # Run the authenticated scan (all required vars already exported above).
    # ---------------------------------------------------------------------------
    bash scripts/run-ica-authenticated-scan.sh
